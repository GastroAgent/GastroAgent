# Model arguments
model_name_or_path: /mnt/inaisfs/data/home/tansy_criait/weights/Qwen2.5-3B-Instruct
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

dataset_name: /mnt/inaisfs/data/home/tansy_criait/jmf/Dataset/numeric ## this is just placeholder
dataset_prompt_column: question ## this is just placeholder

# GDPO trainer config
bf16: true
use_vllm: true
do_eval: false
gradient_accumulation_steps: 1
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
